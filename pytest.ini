[pytest]
testpaths =
    packages/cnes_domain/tests
    packages/cnes_infra/tests
    apps/dump_agent/tests
    apps/data_processor/tests
    apps/central_api/tests
    tests
markers =
    integration: testes que requerem banco Firebird ativo (excluir com -m "not integration")
    bigquery: testes que requerem internet e credenciais Google Cloud
    postgres: testes de integração que requerem PostgreSQL via Docker (excluir com -m "not postgres")
    e2e: testes end-to-end que requerem stack Docker completa (excluir com -m "not e2e")
    windows_only: requer Win32 API (pula em Linux/Docker)
    linux_only: requer POSIX signals/fcntl (pula em Windows)
asyncio_mode = auto
