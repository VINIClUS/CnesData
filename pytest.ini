[pytest]
testpaths =
    packages/cnes_domain/tests
    packages/cnes_infra/tests
    apps/dump_agent/tests
    apps/data_processor/tests
    apps/central_api/tests
    tests
    tests/perf
markers =
    integration: testes que requerem banco Firebird ativo (excluir com -m "not integration")
    bigquery: testes que requerem internet e credenciais Google Cloud
    postgres: testes de integração que requerem PostgreSQL via Docker (excluir com -m "not postgres")
    e2e: testes end-to-end que requerem stack Docker completa (excluir com -m "not e2e")
    windows_only: requer Win32 API (pula em Linux/Docker)
    linux_only: requer POSIX signals/fcntl (pula em Windows)
    concurrency: testes de concorrência multi-thread (sempre executam)
    perf_micro: micro-benchmarks via pytest-benchmark (sempre em PR)
    perf_macro: macro-benchmarks end-to-end (nightly)
    stress: rampa de carga até break-point (nightly)
    soak: carga constante prolongada, detecção de leak (nightly)
    spike: burst de carga 10x, medição de recovery (nightly)
    n_plus_1_debt: route has known N+1 excess (follow-up issue linked)
    race: hypothesis property-based race condition tests
    memleak: pytest-memray memory leak tests
    chaos: fault injection resilience tests
    chaos_infra: testcontainers infra chaos tests
    negative: hypothesis-driven negative input tests
asyncio_mode = auto
