services:
  firebird-shadow:
    image: jacobalberty/firebird:2.5-ss
    environment:
      FIREBIRD_DATABASE: shadow.fdb
      ISC_PASSWORD: masterkey
    volumes:
      - ./docs/fixtures/shadow-seed:/seed:ro
      - fb_shadow_data:/firebird/data
    ports:
      - "3051:3050"

  minio-shadow:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 20

volumes:
  fb_shadow_data:
