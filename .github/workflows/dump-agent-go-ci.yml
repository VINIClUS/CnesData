name: dump-agent-go-ci

on:
  pull_request:
    paths:
      - 'apps/dump_agent_go/**'
      - 'docs/contracts/openapi.json'
      - '.github/workflows/dump-agent-go-ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'apps/dump_agent_go/**'
      - 'docs/contracts/openapi.json'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dump_agent_go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: apps/dump_agent_go/go.sum

      - name: Install tools
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.62.0

      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Lint
        run: golangci-lint run --timeout=5m

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        run: |
          go test -race -count=1 -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

      - name: Coverage gate
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: $total%"
          awk "BEGIN { exit !($total >= 80) }"

      - name: Linux build sanity
        run: go build -v ./cmd/dumpagent

      - name: Cross-compile Windows
        run: GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o /tmp/dumpagent.exe ./cmd/dumpagent
