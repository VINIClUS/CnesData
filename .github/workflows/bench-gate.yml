name: bench-gate

on:
  pull_request:
    paths:
      - 'apps/dump_agent_go/**'
      - '.github/workflows/bench-gate.yml'

jobs:
  bench:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dump_agent_go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: apps/dump_agent_go/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Run bench on PR head
        run: |
          go test -bench=. -benchmem -count=5 -run=^$ \
            ./internal/extractor ./internal/writer ./internal/apiclient \
            > /tmp/pr.bench
      - name: Compare with baseline
        run: |
          $(go env GOPATH)/bin/benchstat benchdata/main.bench /tmp/pr.bench | \
            python ../../scripts/bench_gate.py --max-pct 20
