name: fuzz

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dump_agent_go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: apps/dump_agent_go/go.sum
      - name: Fuzz SanitizeString
        run: go test -fuzz=FuzzSanitizeString -fuzztime=30s ./internal/extractor
      - name: Fuzz BuildDSN
        run: go test -fuzz=FuzzBuildDSN -fuzztime=30s ./internal/fbdriver
      - name: Fuzz WithTenantID
        run: go test -fuzz=FuzzWithTenantID -fuzztime=30s ./internal/apiclient
      - name: Fuzz WithMachineID
        run: go test -fuzz=FuzzWithMachineID -fuzztime=30s ./internal/apiclient
      - name: Upload corpus additions
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzz-corpus-additions-${{ github.run_number }}
          path: apps/dump_agent_go/**/testdata/fuzz/
