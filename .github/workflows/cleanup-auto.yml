name: cleanup-auto

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch target (main|develop)'
        required: true
        type: choice
        options: [main, develop]
      dry_run:
        description: 'Dry run (no push)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  prepare-deletion-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-verify 3 consecutive green shadow runs
        env:
          INPUT_TARGET_BRANCH: ${{ inputs.target_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prev=$(gh run list \
              --workflow=shadow-e2e.yml \
              --branch="$INPUT_TARGET_BRANCH" \
              --limit=3 \
              --json conclusion \
              --jq '.[].conclusion' 2>/dev/null || echo "")
          green=0
          for status in $prev; do
              case "$status" in
                  success) green=$((green + 1));;
                  *) break;;
              esac
          done
          if [ "$green" -lt 3 ]; then
              echo "consecutive_green=$green < 3, abort" >&2
              exit 1
          fi

      - name: Abort if cutover PR already open
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --state open --search "chore: cutover complete in:title" --json number --jq '.[0].number' || echo "")
          if [ -n "$existing" ]; then
              echo "PR #$existing already open, abort" >&2
              exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deps
        run: pip install PyYAML

      - name: Create branch
        run: |
          git config user.email "claude@anthropic.com"
          git config user.name "Claude Cutover Bot"
          git checkout -b chore/cutover-complete-cleanup

      - name: Create final Python tag
        run: |
          version=$(grep -E '^version' apps/dump_agent/pyproject.toml 2>/dev/null | head -1 | cut -d'"' -f2 || echo "0.1.0")
          if [ -n "$version" ]; then
            git tag "dumpagent-py-v${version}-final" || true
            git push origin "dumpagent-py-v${version}-final" || true
          fi

      - name: Delete Python app + artifacts
        run: |
          git rm -r apps/dump_agent/ || true
          git rm -rf spike_fb_driver/ || true
          git rm -f apps/dump_agent_go/coverage.out apps/dump_agent_go/coverage.filtered.out || true
          git rm -f apps/dump_agent_go/dumpagent.exe || true

      - name: Consolidate compose
        run: |
          if [ -f docker-compose.perf.yml ]; then
            python scripts/consolidate_compose.py \
              --input docker-compose.yml docker-compose.perf.yml \
              --profile docker-compose.yml=dev \
              --profile docker-compose.perf.yml=perf \
              --output docker-compose.yml
            git rm -f docker-compose.perf.yml || true
          fi

      - name: Update docs
        run: python scripts/update_post_cutover_docs.py

      - name: Update .gitignore
        run: |
          cat >> .gitignore <<'EOF'
          apps/dump_agent_go/coverage.out
          apps/dump_agent_go/coverage.filtered.out
          apps/dump_agent_go/dumpagent.exe
          *.fbk
          EOF

      - name: Commit
        run: |
          git add -A
          git commit -m "chore(rollout): cutover complete — remove Python + cleanup + consolidate"

      - name: Push + PR
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin chore/cutover-complete-cleanup
          gh pr create \
            --base "${{ inputs.target_branch }}" \
            --head chore/cutover-complete-cleanup \
            --title "chore: cutover complete (Python removido)" \
            --body "Auto-generated post >=3 shadow greens. Removido: apps/dump_agent/, spike_fb_driver/, coverage artifacts. Tag preservada: dumpagent-py-v<version>-final. Merge apenas após review manual."
