name: dump-agent-go

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'apps/dump_agent_go/**'
      - 'docs/contracts/openapi.json'
      - '.github/workflows/dump-agent-go.yml'
  push:
    branches: [main, develop]
    paths:
      - 'apps/dump_agent_go/**'
      - 'docs/contracts/openapi.json'
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: dump-agent-go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dump_agent_go
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: apps/dump_agent_go/go.sum

      - name: Install tools
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Lint
        run: golangci-lint run --timeout=5m

      - name: Vet
        run: go vet ./...

      - name: Test (race + coverage)
        run: |
          go test -race -count=1 -coverprofile=coverage.out ./...
          grep -v -E "internal/apiclient/generated\.go|cmd/|internal/service/|_windows\.go:" coverage.out > coverage.filtered.out
          go tool cover -func=coverage.filtered.out | tail -1

      - name: Coverage gate
        run: |
          total=$(go tool cover -func=coverage.filtered.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage (excluding generated+main): $total%"
          awk "BEGIN { exit !($total >= 65) }"

      - name: Linux build sanity
        run: go build -v ./cmd/dumpagent

      - name: Cross-compile Windows
        run: GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o /tmp/dumpagent.exe ./cmd/dumpagent

  integration-windows:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'run-windows-integration')
      || github.event_name == 'push'
      || github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/dump_agent_go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: apps/dump_agent_go/go.sum

      - name: Download Firebird 2.5
        run: .\scripts\ci\download_firebird.ps1
        shell: powershell

      - name: Start Firebird server
        run: |
          $env:PATH += ";C:\firebird\bin"
          Start-Process -FilePath "C:\firebird\bin\fbguard.exe" -ArgumentList "-a" -PassThru
          Start-Sleep -Seconds 5
        shell: powershell

      - name: Setup synthetic DB
        run: .\scripts\ci\setup_test_db.ps1
        shell: powershell

      - name: Integration tests
        env:
          FB_HOST: localhost
          FB_PATH: C:/tmp/CNES_test.gdb
        run: go test -tags=integration -race -v ./test/integration/... ./internal/extractor/...

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: apps/dump_agent_go/*.log

  sia-integration:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-integration')
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: apps/dump_agent_go/go.sum
      - name: Run SIA integration
        working-directory: apps/dump_agent_go
        run: go test -tags=integration ./test/integration/ -run TestSIA_ -v

  bpa-integration-windows:
    runs-on: windows-latest
    if: >-
      contains(github.event.pull_request.labels.*.name, 'run-windows-integration')
      || github.event_name == 'push'
      || github.event_name == 'schedule'
      || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: apps/dump_agent_go/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x86'
      - name: Install fdb (x86, required for fbclient.dll 1.5.6)
        shell: pwsh
        run: python -m pip install --upgrade pip fdb
      - name: Setup FB 1.5.6 embedded (for GDB generation)
        shell: pwsh
        run: python scripts/fb156_setup.py
      - name: Setup FB 1.5.6 server (for spike TCP)
        shell: pwsh
        run: python scripts/fb156_setup.py --server
      - name: Generate synthetic BPAMAG.GDB
        shell: pwsh
        run: |
          python scripts/gen_bpa_gdb_fixture.py `
            --gdb apps/dump_agent_go/test/integration/fixtures/bpamag_ci.gdb `
            --dll .cache/firebird-1.5.6/fbclient.dll
      - name: Start FB 1.5 server
        shell: pwsh
        run: ./apps/dump_agent_go/scripts/ci/start_fb15.ps1 -Port 3050
      - name: Run BPA integration
        working-directory: apps/dump_agent_go
        env:
          FB15_HOST: localhost
          FB15_PORT: '3050'
          FB15_GDB_PATH: ${{ github.workspace }}/apps/dump_agent_go/test/integration/fixtures/bpamag_ci.gdb
        run: go test -tags="integration windows" ./test/integration/ -run TestBPA_ -v
