[project]
name = "cnes-domain"
version = "0.1.0"
description = "Domain layer — ports, contracts, models, processing (zero I/O)"
requires-python = ">=3.13"
dependencies = [
    "polars>=1.20",
    "pandera>=0.30",
    "pydantic>=2.10",
    "holidays>=0.46",
    "opentelemetry-api>=1.25",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cnes_domain"]
