overlay: 1.0.0
info:
  title: OpenAPI 3.1 to 3.0 downgrade for oapi-codegen
  version: 1.0.0
actions:
  - target: $.openapi
    update: "3.0.3"
  - target: $.components.schemas.AgentStatusResponse.properties.agent_version
    remove: true
  - target: $.components.schemas.AgentStatusResponse.properties.last_seen
    remove: true
  - target: $.components.schemas.AgentStatusResponse.properties.machine_id
    remove: true
  - target: $.components.schemas.AgentStatusResponse.properties
    update:
      agent_version:
        type: string
        nullable: true
        title: Agent Version
      last_seen:
        type: string
        nullable: true
        title: Last Seen
      machine_id:
        type: string
        nullable: true
        title: Machine Id
