services:
  postgres:
    image: postgres:16-alpine
    container_name: cnesdata_pg_test
    environment:
      POSTGRES_USER: cnesdata
      POSTGRES_PASSWORD: cnesdata_test
      POSTGRES_DB: cnesdata_test
    ports:
    - 5433:5432
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U cnesdata -d cnesdata_test
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
    - pgdata_test:/var/lib/postgresql/data
    profiles:
    - dev
  pg-seed:
    image: python:3.13-slim
    container_name: cnesdata_pg_seed
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      PG_TEST_URL: postgresql+psycopg://cnesdata:cnesdata_test@postgres:5432/cnesdata_test
    volumes:
    - ./packages/cnes_infra/tests/fixtures:/app/fixtures
    - ./packages:/app/packages
    - ./pyproject.toml:/app/pyproject.toml
    working_dir: /app
    command: "sh -c \"\n  pip install psycopg[binary] sqlalchemy faker --quiet &&\n\
      \  pip install --no-deps ./packages/cnes_domain ./packages/cnes_infra --quiet\
      \ &&\n  python fixtures/seed_postgres.py\n\"\n"
    profiles:
    - dev
  minio:
    image: minio/minio:latest
    container_name: cnesdata_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
    - 9000:9000
    - 9001:9001
    healthcheck:
      test:
      - CMD-SHELL
      - curl -sf http://localhost:9000/minio/health/live || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
    - minio_data:/data
    profiles:
    - dev
  minio-init:
    image: minio/mc:latest
    container_name: cnesdata_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: "/bin/sh -c \"\n  mc alias set local http://minio:9000 minioadmin\
      \ minioadmin &&\n  mc mb --ignore-existing local/cnesdata-landing &&\n  echo\
      \ 'bucket cnesdata-landing ready'\n\"\n"
    profiles:
    - dev
  migrator:
    build:
      context: .
      dockerfile: apps/cnes_db_migrator/Dockerfile
    container_name: cnesdata_migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgresql+psycopg://cnesdata:cnesdata_test@postgres:5432/cnesdata_test
    profiles:
    - dev
  central-api:
    build:
      context: .
      dockerfile: apps/central_api/Dockerfile
    container_name: cnesdata_central_api
    depends_on:
      migrator:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    ports:
    - 8000:8000
    environment:
      DB_URL: postgresql+psycopg://cnesdata:cnesdata_test@postgres:5432/cnesdata_test
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: 'false'
      MINIO_BUCKET: cnesdata-landing
      API_HOST: 0.0.0.0
      API_PORT: '8000'
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health')"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles:
    - dev
  data-processor:
    build:
      context: .
      dockerfile: apps/data_processor/Dockerfile
    container_name: cnesdata_data_processor
    depends_on:
      central-api:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_URL: postgresql+psycopg://cnesdata:cnesdata_test@postgres:5432/cnesdata_test
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: 'false'
      MINIO_BUCKET: cnesdata-landing
      PROCESSOR_ID: docker-processor-01
      PROCESSOR_POLL_INTERVAL: '5.0'
    profiles:
    - dev
    restart: on-failure
  postgres_perf:
    image: postgres:16-alpine
    container_name: cnesdata_pg_perf
    environment:
      POSTGRES_USER: cnesdata
      POSTGRES_PASSWORD: cnesdata_perf
      POSTGRES_DB: cnesdata_perf
    ports:
    - 5434:5432
    command:
    - postgres
    - -c
    - shared_buffers=512MB
    - -c
    - max_connections=200
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U cnesdata -d cnesdata_perf
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
    - pgdata_perf:/var/lib/postgresql/data
    profiles:
    - perf
  firebird_perf:
    image: jacobalberty/firebird:v4.0.5
    container_name: cnesdata_fb_perf
    environment:
      ISC_PASSWORD: masterkey
      FIREBIRD_DATABASE: CNES.FDB
      FIREBIRD_USER: SYSDBA
    ports:
    - 3051:3050
    volumes:
    - fbdata_perf:/firebird/data
    profiles:
    - perf
  firebird-shadow:
    image: jacobalberty/firebird:2.5-ss
    container_name: cnesdata_fb_shadow
    environment:
      FIREBIRD_DATABASE: shadow.fdb
      ISC_PASSWORD: masterkey
    volumes:
    - ./docs/fixtures/shadow-seed:/seed:ro
    - fb_shadow_data:/firebird/data
    ports:
    - "3052:3050"
    profiles:
    - shadow
  minio-shadow:
    image: minio/minio:latest
    container_name: cnesdata_minio_shadow
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
    - "9100:9000"
    - "9101:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 20
    profiles:
    - shadow
volumes:
  pgdata_test: null
  minio_data: null
  pgdata_perf: null
  fbdata_perf: null
  fb_shadow_data: null
