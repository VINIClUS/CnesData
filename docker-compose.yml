services:
  postgres:
    image: postgres:16-alpine
    container_name: cnesdata_pg_test
    environment:
      POSTGRES_USER: cnesdata
      POSTGRES_PASSWORD: cnesdata_test
      POSTGRES_DB: cnesdata_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnesdata -d cnesdata_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata_test:/var/lib/postgresql/data

  pg-seed:
    image: python:3.13-slim
    container_name: cnesdata_pg_seed
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_TEST_URL: postgresql+psycopg://cnesdata:cnesdata_test@postgres:5432/cnesdata_test
    volumes:
      - ./tests/fixtures:/app/fixtures
      - ./src:/app/src
    working_dir: /app
    command: >
      sh -c "
        pip install psycopg[binary] sqlalchemy faker --quiet &&
        PYTHONPATH=/app/src python fixtures/seed_postgres.py
      "

  minio:
    image: minio/minio:latest
    container_name: cnesdata_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: cnesdata_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/cnesdata-landing &&
        echo 'bucket cnesdata-landing ready'
      "

  migrator:
    build:
      context: .
      dockerfile: apps/cnes_db_migrator/Dockerfile
    container_name: cnesdata_migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgresql+psycopg://cnesdata:cnesdata_test@postgres:5432/cnesdata_test

  central-api:
    build:
      context: .
      dockerfile: apps/central_api/Dockerfile
    container_name: cnesdata_central_api
    depends_on:
      migrator:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DB_URL: postgresql+psycopg://cnesdata:cnesdata_test@postgres:5432/cnesdata_test
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET: cnesdata-landing
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
    healthcheck:
      test: >-
        python -c
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health')"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  dump-agent:
    build:
      context: .
      dockerfile: apps/dump_agent/Dockerfile
    container_name: cnesdata_dump_agent
    depends_on:
      central-api:
        condition: service_healthy
    environment:
      DB_URL: postgresql+psycopg://cnesdata:cnesdata_test@postgres:5432/cnesdata_test
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_BUCKET: cnesdata-landing
      API_BASE_URL: http://central-api:8000
      MACHINE_ID: docker-agent-01
      MAX_JITTER_SECONDS: "5"
    profiles:
      - full
    restart: on-failure

volumes:
  pgdata_test:
  minio_data:
